<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terminal Vault-Tec</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="boot-screen">
  <div class="boot-text">
    <p id="boot-output"></p>
    <span class="boot-cursor">█</span>
  </div>
</div>

<div class="scanlines"></div>
<div class="vignette"></div>

<div class="terminal">
  <header class="topbar">
    <button onclick="trocarPagina('inicio')">INÍCIO</button>
    <button onclick="abrirSubmenu('submenu-faccoes')">FACÇÕES</button>
    <button onclick="abrirSubmenu('submenu-vaults')">VAULTS</button>
    <button onclick="abrirSubmenu('submenu-bestiario')">BESTIÁRIO</button>
    <button onclick="abrirSubmenu('submenu-special')">S.P.E.C.I.A.L</button>
    <button onclick="trocarPagina('sistema')">SISTEMA</button>
  </header>

  <div id="submenu-faccoes" class="submenu-top">
    <span class="submenu-label">PRINCIPAIS</span>
    <button onclick="abrirFaccao('ncr')">NCR</button>
    <button onclick="abrirFaccao('enclave')">ENCLAVE</button>
    <button onclick="abrirFaccao('bos')">BROTHERHOOD</button>
    <button onclick="abrirFaccao('legion')">CAESAR LEGION</button>
    <button onclick="abrirFaccao('minutemen')">MINUTEMEN</button>

    <span class="submenu-label hostile-label">HOSTIS</span>
    <button class="hostile-menu" onclick="abrirFaccao('faccoes_hostis')">ARQUIVO HOSTIL</button>
    <button class="hostile-menu" onclick="abrirFaccao('raiders')">RAIDERS</button>
    <button class="hostile-menu" onclick="abrirFaccao('fiends')">FIENDS</button>
    <button class="hostile-menu" onclick="abrirFaccao('khans')">GREAT KHANS</button>
    <button class="hostile-menu" onclick="abrirFaccao('mutants')">SUPER MUTANTS</button>
    <button class="hostile-menu" onclick="abrirFaccao('children')">CHILDREN OF ATOM</button>
    <button class="hostile-menu" onclick="abrirFaccao('railroad')">RAILROAD</button>
  </div>

  <div id="submenu-vaults" class="submenu-top">
    <button onclick="trocarPagina('vault13')">VAULT 13</button>
    <button onclick="trocarPagina('vault111')">VAULT 111</button>
    <button onclick="trocarPagina('vaulttec')">VAULT-TEC</button>
  </div>

  <div id="submenu-bestiario" class="submenu-top">
    <button onclick="abrirBestiario()">ARQUIVO GERAL</button>
    <button onclick="trocarPagina('besta_necroticos')">NECRÓTICOS</button>
    <button onclick="trocarPagina('besta_radbaratas')">RADBARATAS</button>
    <button onclick="trocarPagina('besta_mutantes')">SUPER MUTANTES</button>
    <button onclick="trocarPagina('besta_mongrels')">MONGRELS</button>
    <button onclick="trocarPagina('besta_vermes')">VERMES RADIOATIVOS</button>
    <button onclick="trocarPagina('besta_deathclaw')">DEATHCLAW</button>
  </div>

  <div id="submenu-special" class="submenu-top">
    <button onclick="trocarPagina('special_s')">S - SOBREVIVÊNCIA</button>
    <button onclick="trocarPagina('special_p')">P - PERCEPÇÃO</button>
    <button onclick="trocarPagina('special_e')">E - ENERGIA</button>
    <button onclick="trocarPagina('special_c')">C - CARISMA</button>
    <button onclick="trocarPagina('special_i')">I - INTELIGÊNCIA</button>
    <button onclick="trocarPagina('special_a')">A - AGILIDADE</button>
    <button onclick="trocarPagina('special_l')">L - LÁBIA</button>
  </div>

  <main class="main-area">
    <section class="pipboy-box">
      <img src="assets/pipboy.png" class="pipboy-img" alt="Vault Boy">
      <p class="blink">VAULT-BOY STATUS: ONLINE</p>
      <button id="anim-toggle" class="anim-toggle" onclick="alternarAnimacoes()">TEXTO ANIMADO: ON</button>
    </section>

    <section class="content">
      <div class="status">
        <div class="stat-card">
          <div class="stat-label">HP <span id="hp-text">80%</span></div>
          <div class="bar"><div class="bar-fill hp" id="hp-bar"></div></div>
        </div>

        <div class="stat-card">
          <div class="stat-label">RAD <span id="rad-text">20%</span></div>
          <div class="bar"><div class="bar-fill rad" id="rad-bar"></div></div>
        </div>

        <div class="stat-card small">LVL 07</div>
        <div class="stat-card small">CAPS 1250</div>
      </div>

      <h1 id="titulo">TERMINAL DA VAULT-TEC</h1>
      <div id="update-box" class="update-box" onclick="abrirFaccao('minutemen')">
  <span class="update-tag">NOVA ATUALIZAÇÃO</span>
  <strong>Facções atualizadas</strong>
  <p>Sistema de atributos S.P.E.C.I.A.L adicionado às facções.</p>
  <small>&gt; CLIQUE PARA ACESSAR</small>
</div>
      <img id="faction-img" class="faction-img" alt="Ícone da facção">
      <p id="texto" class="typing"></p>
      <div id="bestiario-controle" class="bestiario-controle"></div>
      <img id="special-img" class="special-img" alt="Imagem S.P.E.C.I.A.L">
    </section>
  </main>
</div>

document.addEventListener("click", () => audioCtx.resume());

let intervalo;

let paginaBestiario = 1;

function som(freq, duracao, volume, tipo = "square") {
  if (audioCtx.state === "suspended") return;

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = tipo;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(volume, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duracao);

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + duracao);
}

function tocarClique() {
  som(180, 0.08, 0.12, "square");
  setTimeout(() => som(70, 0.05, 0.07, "triangle"), 45);
}

function tocarTecla() {
  som(520, 0.025, 0.025, "square");
}

function tocarGlitch() {
  for (let i = 0; i < 4; i++) {
    setTimeout(() => som(120 + Math.random() * 500, 0.04, 0.035, "sawtooth"), i * 35);
  }
}

function alternarAnimacoes() {
  animacoesTextoAtivas = !animacoesTextoAtivas;
  document.body.classList.toggle("sem-animacoes", !animacoesTextoAtivas);

  const botao = document.getElementById("anim-toggle");
  botao.textContent = animacoesTextoAtivas ? "TEXTO ANIMADO: ON" : "TEXTO ANIMADO: OFF";

  tocarClique();
}

function mostrarImagemFacao(imgSrc, tipo = "") {
  const img = document.getElementById("faction-img");

  if (!imgSrc) {
    img.style.display = "none";
    img.removeAttribute("src");
    img.className = "faction-img";
    return;
  }

  img.src = imgSrc;
  img.style.display = "block";
  img.className = `faction-img ${tipo}`;
}

function mostrarImagemSpecial(imgSrc) {
  const img = document.getElementById("special-img");

  if (!imgSrc) {
    img.style.display = "none";
    img.removeAttribute("src");
    return;
  }

  img.src = imgSrc;
  img.style.display = "block";
}

function fecharSubmenus() {
  document.querySelectorAll(".submenu-top").forEach(menu => menu.classList.remove("ativo"));
}

function abrirSubmenu(id) {
  tocarClique();

  const submenu = document.getElementById(id);
  const estavaAberto = submenu.classList.contains("ativo");

  fecharSubmenus();

  if (!estavaAberto) submenu.classList.add("ativo");
}

function digitarTexto(texto, comSom = true) {
  clearInterval(intervalo);

  const elemento = document.getElementById("texto");
  elemento.textContent = "";

  if (!animacoesTextoAtivas) {
    elemento.textContent = texto;
    return;
  }

  let i = 0;

  intervalo = setInterval(() => {
    elemento.textContent += texto[i];

    if (comSom && i % 2 === 0) tocarTecla();

    i++;

    if (i >= texto.length) clearInterval(intervalo);
  }, 25);
}

function abrirBestiario() {
  paginaBestiario = 1;

  } else {

function trocarPagina(pagina, manterControleBestiario = false) {
  if (!paginas[pagina]) return;

  const updateBox = document.getElementById("update-box");
if (updateBox) {
  updateBox.style.display = pagina === "inicio" ? "block" : "none";
}

  const controleBestiario = document.getElementById("bestiario-controle");
  if (controleBestiario && !manterControleBestiario) controleBestiario.style.display = "none";

  tocarClique();
  tocarGlitch();
  fecharSubmenus();

  document.getElementById("titulo").textContent = paginas[pagina].titulo;
  digitarTexto(paginas[pagina].texto, true);
  mostrarImagemFacao(paginas[pagina].imagem, paginas[pagina].tipo);
  mostrarImagemSpecial(paginas[pagina].specialImagem);
}

function glitchBar(idTexto, idBarra, base, variacao, tipo) {
  setInterval(() => {
    const valor = base + Math.floor(Math.random() * variacao * 2 - variacao);
    const valorLimitado = Math.max(0, Math.min(100, valor));
    const texto = document.getElementById(idTexto);
    const barra = document.getElementById(idBarra);
    const card = barra.closest(".stat-card");

    texto.textContent = valorLimitado + "%";
    barra.style.width = valorLimitado + "%";

    if (tipo === "hp") card.classList.toggle("glitch-alert", valorLimitado < 78);
    if (tipo === "rad") card.classList.toggle("rad-alert", valorLimitado > 21);
  }, 420);
}

const bootLinhas = [
  "ROBCO INDUSTRIES UNIFIED OPERATING SYSTEM",
  "COPYRIGHT 2075-2077 ROBCO INDUSTRIES",

  "INITIALIZING PIP-BOY 3000...",
  "CHECKING MEMORY... OK",

function iniciarBoot() {
  const boot = document.getElementById("boot-screen");
  const output = document.getElementById("boot-output");

  boot.classList.add("glitchando");

  let linha = 0;
  let letra = 0;
  let textoFinal = "";

  const intervaloBoot = setInterval(() => {
    textoFinal += bootLinhas[linha][letra];
    output.innerHTML = textoFinal.replace(/\n/g, "<br>");
    letra++;

    if (letra >= bootLinhas[linha].length) {
      textoFinal += "\n";
      linha++;
      letra = 0;
    }

    if (linha >= bootLinhas.length) {
      clearInterval(intervaloBoot);
      boot.classList.remove("glitchando");
      boot.classList.add("piscando");

      setTimeout(() => {
        boot.style.opacity = "0";

        setTimeout(() => {
          boot.style.display = "none";
          document.body.classList.remove("booting");
        }, 800);
      }, 2000);
    }
  }, 35);
}

document.getElementById("titulo").textContent = paginas.inicio.titulo;
digitarTexto(paginas.inicio.texto, false);
