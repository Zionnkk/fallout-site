  <link rel="stylesheet" href="style.css">
</head>

<div id="boot-screen">

    <p id="boot-output"></p>
    <span class="boot-cursor">█</span>
  </div>
</div>

<div class="vignette"></div>

    <button class="hostile-menu" onclick="trocarPagina('khans')">GREAT KHANS</button>

    <button class="hostile-menu" onclick="trocarPagina('children')">CHILDREN OF ATOM</button>

    <button onclick="trocarPagina('vault111')">VAULT 111</button>

    <button onclick="trocarPagina('besta_radbaratas')">RADBARATAS</button>

    <button onclick="trocarPagina('besta_vermes')">VERMES RADIOATIVOS</button>
    <button onclick="trocarPagina('besta_deathclaw')">DEATHCLAW</button>

    <button onclick="trocarPagina('special_s')">S - SOBREVIVÊNCIA</button>
    <button onclick="trocarPagina('special_p')">P - PERCEPÇÃO</button>
    <button onclick="trocarPagina('special_e')">E - ENERGIA</button>

    <button onclick="trocarPagina('special_i')">I - INTELIGÊNCIA</button>

      </div>

      <img id="special-img" class="special-img" alt="Imagem S.P.E.C.I.A.L">
    </section>
  </main>
</div>

function som(freq, duracao, volume, tipo = "square") {
  if (audioCtx.state === "suspended") return;

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = tipo;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(volume, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duracao);

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + duracao);
}

function tocarClique() {
  som(180, 0.08, 0.12, "square");
  setTimeout(() => som(70, 0.05, 0.07, "triangle"), 45);
}

function tocarTecla() {
  som(520, 0.025, 0.025, "square");
}

function tocarGlitch() {
  for (let i = 0; i < 4; i++) {
    setTimeout(() => som(120 + Math.random() * 500, 0.04, 0.035, "sawtooth"), i * 35);
  }
}

function alternarAnimacoes() {
  animacoesTextoAtivas = !animacoesTextoAtivas;
  document.body.classList.toggle("sem-animacoes", !animacoesTextoAtivas);

  const botao = document.getElementById("anim-toggle");
  botao.textContent = animacoesTextoAtivas ? "TEXTO ANIMADO: ON" : "TEXTO ANIMADO: OFF";

  tocarClique();
}

function mostrarImagemFacao(imgSrc, tipo = "") {
  const img = document.getElementById("faction-img");

  if (!imgSrc) {
    img.style.display = "none";
    img.removeAttribute("src");
    img.className = "faction-img";
    return;
  }

  img.src = imgSrc;
  img.style.display = "block";
  img.className = `faction-img ${tipo}`;
}

function mostrarImagemSpecial(imgSrc) {
  const img = document.getElementById("special-img");

  if (!imgSrc) {
    img.style.display = "none";
    img.removeAttribute("src");
    return;
  }

  img.src = imgSrc;
  img.style.display = "block";
}

function fecharSubmenus() {
  document.querySelectorAll(".submenu-top").forEach(menu => menu.classList.remove("ativo"));
}

function abrirSubmenu(id) {
  tocarClique();

  const submenu = document.getElementById(id);
  const estavaAberto = submenu.classList.contains("ativo");

  fecharSubmenus();

  if (!estavaAberto) submenu.classList.add("ativo");
}

function digitarTexto(texto, comSom = true) {
  clearInterval(intervalo);

  const elemento = document.getElementById("texto");
  elemento.textContent = "";

  if (!animacoesTextoAtivas) {
    elemento.textContent = texto;
    return;
  }

  let i = 0;

  intervalo = setInterval(() => {
    elemento.textContent += texto[i];

    if (comSom && i % 2 === 0) tocarTecla();

    i++;

    if (i >= texto.length) clearInterval(intervalo);
  }, 25);
}

function abrirBestiario() {
  paginaBestiario = 1;
  trocarPagina("bestiario_sobre", true);
  mostrarControleBestiario();
}

function alternarPaginaBestiario() {
  if (paginaBestiario === 1) {
    paginaBestiario = 2;
    trocarPagina("bestiario_atributos", true);
  } else {
    paginaBestiario = 1;
    trocarPagina("bestiario_sobre", true);
  }

  mostrarControleBestiario();
}

function mostrarControleBestiario() {
  const controle = document.getElementById("bestiario-controle");

  controle.style.display = "flex";
  controle.innerHTML = `
    <button onclick="alternarPaginaBestiario()" class="page-arrow blink-arrow">
      ${paginaBestiario === 1 ? ">" : "<"}
    </button>
    <span>PÁGINA ${paginaBestiario}/2</span>
  `;
}

function trocarPagina(pagina, manterControleBestiario = false) {
  if (!paginas[pagina]) return;

  const controleBestiario = document.getElementById("bestiario-controle");
  if (controleBestiario && !manterControleBestiario) controleBestiario.style.display = "none";

  tocarClique();
  tocarGlitch();
  fecharSubmenus();

  document.getElementById("titulo").textContent = paginas[pagina].titulo;
  digitarTexto(paginas[pagina].texto, true);
  mostrarImagemFacao(paginas[pagina].imagem, paginas[pagina].tipo);
  mostrarImagemSpecial(paginas[pagina].specialImagem);
}

function glitchBar(idTexto, idBarra, base, variacao, tipo) {
  setInterval(() => {
    const valor = base + Math.floor(Math.random() * variacao * 2 - variacao);
    const valorLimitado = Math.max(0, Math.min(100, valor));
    const texto = document.getElementById(idTexto);
    const barra = document.getElementById(idBarra);
    const card = barra.closest(".stat-card");

    texto.textContent = valorLimitado + "%";
    barra.style.width = valorLimitado + "%";

    if (tipo === "hp") card.classList.toggle("glitch-alert", valorLimitado < 78);
    if (tipo === "rad") card.classList.toggle("rad-alert", valorLimitado > 21);
  }, 420);
}

const bootLinhas = [
  "ROBCO INDUSTRIES UNIFIED OPERATING SYSTEM",
  "COPYRIGHT 2075-2077 ROBCO INDUSTRIES",
  "----------------------------------------",
  "INITIALIZING PIP-BOY 3000...",
  "CHECKING MEMORY... OK",
  "LOADING VAULT-TEC DATABASE... OK",
  "STARTING INTERFACE..."
];

function iniciarBoot() {
  const boot = document.getElementById("boot-screen");
  const output = document.getElementById("boot-output");

  boot.classList.add("glitchando");

  let linha = 0;
  let letra = 0;
  let textoFinal = "";

  const intervaloBoot = setInterval(() => {
    textoFinal += bootLinhas[linha][letra];
    output.innerHTML = textoFinal.replace(/\n/g, "<br>");
    letra++;

    if (letra >= bootLinhas[linha].length) {
      textoFinal += "\n";
      linha++;
      letra = 0;
    }

    if (linha >= bootLinhas.length) {
      clearInterval(intervaloBoot);
      boot.classList.remove("glitchando");
      boot.classList.add("piscando");

      setTimeout(() => {
        boot.style.opacity = "0";

        setTimeout(() => {
          boot.style.display = "none";
          document.body.classList.remove("booting");
        }, 800);
      }, 2000);
    }
  }, 35);
}

document.getElementById("titulo").textContent = paginas.inicio.titulo;
digitarTexto(paginas.inicio.texto, false);
mostrarImagemFacao(null);
mostrarImagemSpecial(null);
glitchBar("hp-text", "hp-bar", 80, 7, "hp");
glitchBar("rad-text", "rad-bar", 20, 5, "rad");
iniciarBoot();
</script>
